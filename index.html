<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI Study Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="학습 내용과 코드를 모아두는 정적 위키 사이트입니다.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Docsify Themeable Stylesheet -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- MathJax for rendering math formulas (LaTeX) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- Custom Premium Styles -->
  <style>
    :root {
      /* Font settings */
      --base-font-family: 'Inter', 'Noto Sans KR', sans-serif;
      --heading-font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      --code-font-family: 'Fira Code', monospace;

      /* Color Palette (Modern Indigo & Violet theme) */
      --theme-color: #6366f1; /* Indigo */
      --base-background: #ffffff;
      --base-color: #1e293b; /* Slate 800 */
      
      /* Sidebar styling */
      --sidebar-background: #f8fafc; /* Slate 50 */
      --sidebar-width: 280px;
      --sidebar-border-width: 1px;
      --sidebar-border-color: #e2e8f0;
      --sidebar-nav-link-color: #475569;
      --sidebar-nav-link-color--active: #6366f1;
      --sidebar-nav-link-font-weight--active: 600;

      /* Content width and spacing */
      --content-max-width: 800px;
      
      /* Code styling */
      --code-theme-background: #0f172a; /* Slate 900 */
      --code-theme-color: #e2e8f0;
      --code-inline-background: #f1f5f9;
      --code-inline-color: #dc2626;
      --code-inline-border-radius: 4px;
      --code-inline-padding: 3px 6px;
    }

    /* Custom styles overrides */
    body {
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      -webkit-font-smoothing: antialiased;
    }

    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 {
      font-family: var(--heading-font-family);
      font-weight: 700;
      color: #0f172a; /* Slate 900 */
      letter-spacing: -0.02em;
    }

    .markdown-section h1 {
      font-size: 2.25rem;
      border-bottom: 2px solid #f1f5f9;
      padding-bottom: 0.5rem;
      margin-top: 1.5rem;
    }

    .markdown-section h2 {
      font-size: 1.6rem;
      margin-top: 2rem;
      border-bottom: 1px solid #f1f5f9;
      padding-bottom: 0.3rem;
    }

    /* Premium glassmorphic effect for Sidebar */
    section.sidebar {
      background: rgba(248, 250, 252, 0.9);
      backdrop-filter: blur(10px);
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.02);
    }

    .sidebar .app-name-link {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: #0f172a !important;
      letter-spacing: -0.01em;
      padding: 10px 0;
      display: block;
      text-transform: uppercase;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Table custom styles */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.5rem 0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      border-radius: 8px;
      overflow: hidden;
    }

    .markdown-section th {
      background-color: #f1f5f9;
      color: #334155;
      font-weight: 600;
      text-align: left;
      padding: 12px 16px;
    }

    .markdown-section td {
      padding: 12px 16px;
      border-bottom: 1px solid #f1f5f9;
      color: #475569;
    }

    .markdown-section tr:last-child td {
      border-bottom: none;
    }

    /* Alert GitHub-Style customization */
    .markdown-section blockquote {
      border-left: 4px solid #cbd5e1;
      background-color: #f8fafc;
      padding: 12px 20px;
      margin: 1.5rem 0;
      border-radius: 0 8px 8px 0;
      color: #334155;
    }

    /* LaTeX equation adjustments */
    .mjx-chtml {
      font-size: 110% !important;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'AI Study Wiki',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      autoHeader: true,
      coverpage: false,

      // Search config
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '검색어를 입력하세요...',
        noData: '검색 결과가 없습니다.',
        depth: 6,
        preventSubmit: true
      },

      // Copy code config
      copyCode: {
        buttonText : '복사',
        errorText  : '에러',
        successText: '복사됨'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <!-- MathJax configuration for Docsify (LaTeX support) -->
  <script>
    // Wait for content loaded and then trigger MathJax rendering
    document.addEventListener('DOMContentLoaded', function() {
      if (window.MathJax) {
        window.$docsify.plugins = [].concat(function(hook, vm) {
          hook.doneEach(function() {
            MathJax.typesetPromise();
          });
        }, window.$docsify.plugins);
      }
    });
  </script>
</body>
</html>
