<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>AI Study Wiki</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="학습 내용과 코드를 모아두는 정적 위키 사이트입니다.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Roboto:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Docsify Themeable Stylesheet (Simple Dark Theme) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">

  <!-- MathJax for rendering math formulas (LaTeX) -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <!-- Custom Premium Styles (Android Developer Dark Mode) -->
  <style>
    :root {
      /* Font settings */
      --base-font-family: 'Roboto', 'Noto Sans KR', sans-serif;
      --heading-font-family: 'Roboto', 'Noto Sans KR', sans-serif;
      --code-font-family: 'Fira Code', monospace;

      /* Color Palette (Android Developer Dark Theme) */
      --theme-color: #3ddc84; /* Android Green */
      --base-background: #131416; /* Deep dark background */
      --base-color: #e3e3e3; /* Light gray text */
      
      /* Sidebar styling */
      --sidebar-background: #1f2023; /* Darker card gray */
      --sidebar-width: 280px;
      --sidebar-border-width: 1px;
      --sidebar-border-color: #2d3035;
      --sidebar-nav-link-color: #9aa0a6;
      --sidebar-nav-link-color--active: #3ddc84;
      --sidebar-nav-link-font-weight--active: 600;

      /* Content width and spacing */
      --content-max-width: 800px;
      
      /* Code styling */
      --code-theme-background: #1e1f22;
      --code-theme-color: #e3e3e3;
      --code-inline-background: #2a2b2f;
      --code-inline-color: #3ddc84;
      --code-inline-border-radius: 4px;
      --code-inline-padding: 3px 6px;
    }

    /* Custom styles overrides */
    body {
      font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      -webkit-font-smoothing: antialiased;
      background-color: #131416;
    }

    .markdown-section h1, .markdown-section h2, .markdown-section h3, .markdown-section h4 {
      font-family: var(--heading-font-family);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
    }

    .markdown-section h1 {
      font-size: 2.25rem;
      border-bottom: 2px solid #2d3035;
      padding-bottom: 0.5rem;
      margin-top: 1.5rem;
    }

    .markdown-section h2 {
      font-size: 1.6rem;
      margin-top: 2rem;
      border-bottom: 1px solid #2d3035;
      padding-bottom: 0.3rem;
    }

    /* Sidebar customize */
    section.sidebar {
      background: #1f2023;
      box-shadow: 2px 0 8px rgba(0, 0, 0, 0.2);
    }

    .sidebar .app-name-link {
      font-family: 'Roboto', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: #3ddc84 !important;
      letter-spacing: -0.01em;
      padding: 10px 0;
      display: block;
      text-transform: uppercase;
      background: none;
      -webkit-background-clip: unset;
      -webkit-text-fill-color: initial;
    }

    /* Search bar customization for Android Developer dark mode */
    .sidebar .search input {
      background-color: #2d3035 !important;
      border: 1px solid #3c4043 !important;
      color: #ffffff !important;
      border-radius: 8px !important;
    }

    .sidebar .search input:focus {
      border-color: #3ddc84 !important;
      box-shadow: 0 0 0 2px rgba(61, 220, 132, 0.2) !important;
    }

    /* Table custom styles */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.5rem 0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      overflow: hidden;
      background-color: #1e1f22;
    }

    .markdown-section th {
      background-color: #2d3035;
      color: #ffffff;
      font-weight: 600;
      text-align: left;
      padding: 12px 16px;
    }

    .markdown-section td {
      padding: 12px 16px;
      border-bottom: 1px solid #2d3035;
      color: #e3e3e3;
    }

    .markdown-section tr:last-child td {
      border-bottom: none;
    }

    /* Alert GitHub-Style customization (Android Green accent) */
    .markdown-section blockquote {
      border-left: 4px solid #3ddc84;
      background-color: #1e1f22;
      padding: 12px 20px;
      margin: 1.5rem 0;
      border-radius: 0 8px 8px 0;
      color: #e3e3e3;
    }

    /* Link color */
    .markdown-section a {
      color: #8ab4f8; /* Muted blue for links in dark mode */
      text-decoration: none;
    }

    .markdown-section a:hover {
      text-decoration: underline;
    }

    /* LaTeX equation adjustments */
    .mjx-chtml {
      font-size: 110% !important;
      padding: 8px 0;
      color: #ffffff;
    }
  </style>
</head>
<body>
  <div id="app">로딩 중...</div>
  <script>
    window.$docsify = {
      name: 'AI Study Wiki',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      autoHeader: true,
      coverpage: false,

      // Search config
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '검색어를 입력하세요...',
        noData: '검색 결과가 없습니다.',
        depth: 6,
        preventSubmit: true
      },

      // Copy code config
      copyCode: {
        buttonText : '복사',
        errorText  : '에러',
        successText: '복사됨'
      },

      // Custom Plugins (GitHub Alert Syntax Support)
      plugins: [
        function(hook, vm) {
          hook.afterEach(function(html, next) {
            var alertTypes = {
              'NOTE': { icon: 'ℹ️', title: 'Note', color: '#8ab4f8' },
              'TIP': { icon: '💡', title: 'Tip', color: '#3ddc84' },
              'IMPORTANT': { icon: '📢', title: 'Important', color: '#a855f7' },
              'WARNING': { icon: '⚠️', title: 'Warning', color: '#f2994a' },
              'CAUTION': { icon: '🛑', title: 'Caution', color: '#eb5757' }
            };
            
            var parser = new DOMParser();
            var doc = parser.parseFromString(html, 'text/html');
            var blockquotes = doc.querySelectorAll('blockquote');
            
            blockquotes.forEach(function(bq) {
              var content = bq.innerHTML;
              var match = content.match(/\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]/i);
              if (match) {
                var typeKey = match[1].toUpperCase();
                var alertInfo = alertTypes[typeKey];
                
                // Clean the [!TYPE] markup, including potential <br> or spaces after it
                var cleanedContent = content.replace(/\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*(<br>)?/i, '').trim();
                
                // Apply layout styles
                bq.style.borderLeft = '4px solid ' + alertInfo.color;
                bq.style.backgroundColor = '#1e1f22';
                bq.style.padding = '16px';
                bq.style.borderRadius = '0 8px 8px 0';
                bq.style.margin = '1.5rem 0';
                
                bq.innerHTML = '<div style="display: flex; align-items: center; font-weight: 700; color: ' + alertInfo.color + '; margin-bottom: 8px; font-family: var(--heading-font-family);">' +
                               '<span style="margin-right: 8px; font-size: 1.1rem; display: flex; align-items: center;">' + alertInfo.icon + '</span>' +
                               '<span>' + alertInfo.title + '</span>' +
                               '</div>' +
                               '<div style="color: #e3e3e3;">' + cleanedContent + '</div>';
              }
            });
            
            next(doc.body.innerHTML);
          });
        }
      ]
    }
  </script>
  <!-- Docsify v4 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

  <!-- Mermaid -->
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
    mermaid.initialize({ startOnLoad: true });
    window.mermaid = mermaid;
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.js"></script>

  <!-- MathJax configuration for Docsify (LaTeX support) -->
  <script>
    // Wait for content loaded and then trigger MathJax rendering
    document.addEventListener('DOMContentLoaded', function() {
      if (window.MathJax) {
        window.$docsify.plugins = [].concat(function(hook, vm) {
          hook.doneEach(function() {
            MathJax.typesetPromise();
          });
        }, window.$docsify.plugins || []);
      }
    });
  </script>
</body>
</html>
